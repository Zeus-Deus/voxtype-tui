# A user who trimmed their config to only the minimum required sections,
# leaving every optional subsystem as instructional comments from the default
# template. Editing vocabulary or replacements requires us to materialize new
# sections without destroying any of these comments.

# state_file = "auto"

[hotkey]
key = "SCROLLLOCK"
# modifiers = ["LEFTCTRL", "LEFTALT"]
# mode = "push_to_talk"

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 60

# [audio.feedback]
# enabled = true
# theme = "default"
# volume = 0.7

[whisper]
model = "base.en"
language = "en"
translate = false

[output]
mode = "type"
